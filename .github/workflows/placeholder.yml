name: Full Project CI/CD

on:
  push:
    branches:
      - 'feature/**'
      - develop
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Stage 1: Test & Lint (runs for all branches)
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: teamhub_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Env setup for both backend and frontend
      - name: Set up Python & Node.js
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Backend Tests
      - name: Backend Tests
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/teamhub_db
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: |
          cd backend
          pip install -r requirements.txt
          python manage.py test tests/

      # Frontend Lint & Build Check
      - name: Frontend Lint & Build Check
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build # Проверяем, что билд фронта в принципе собирается

  # Stage 2: Docker Integration Smoke Test (only for develop and main branches)
  integration-smoke-test:
    needs: test-and-lint
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Up via Docker Compose
        run: |
          # Собираем образы и запускаем контейнеры в фоновом режиме
          docker compose up -d --build

      - name: Wait for Services (Warm-up)
        run: sleep 20

      - name: Smoke Test - Check Connectivity
        run: |
          echo "Checking Frontend availability..."
          curl -f http://localhost:3000 || (docker compose logs frontend && exit 1)
          
          echo "Checking Backend API connectivity..."
          curl -f http://localhost:8000/api/v1/health/ || (docker compose logs backend && exit 1)
          
          echo "Checking if containers are running..."
          docker ps
          
      - name: Cleanup
        if: always()
        run: docker compose down

  # Stage 3: Docker Deploy (only for main branch)
  docker-deploy:
    needs: integration-smoke-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tagging as a latest for Docker Hub
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/teamhub-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/teamhub-frontend:latest