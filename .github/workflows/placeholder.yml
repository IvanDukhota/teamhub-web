name: Full Project CI/CD

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: teamhub_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Backend Deps
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/teamhub_db
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: |
          cd backend
          python manage.py test tests/ 

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Deps
        run: |
          cd frontend
          npm ci

      - name: Frontend Lint
        run: |
          cd frontend
          npm run lint

      - name: Frontend Build check
        run: |
          cd frontend
          npm run build

  integration:
    needs: build-and-test
    if: github.event_name == 'pull_request' && (github.base_ref == 'develop' || github.base_ref == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Project Cohesion
        run: |
          echo "Running integration checks for Backend & Frontend connectivity..."

  docker-deploy:
    needs: integration
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/teamhub-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/teamhub-frontend:latest
