name: Full Project CI/CD

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend-check:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install & Build (Check)
        run: |
          cd frontend
          npm ci
          npm run build # Если билд прошел — значит JSX/TSX валидны

  backend-check:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install & Lint
        run: |
          cd backend
          pip install -r requirements.txt
          python manage.py check # Проверка настроек Django

  docker-build-push:
    needs: [frontend-check, backend-check]
    if: |
      always() && 
      github.ref == 'refs/heads/main' && 
      (needs.frontend-check.result == 'success' || needs.frontend-check.result == 'skipped') &&
      (needs.backend-check.result == 'success' || needs.backend-check.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/teamhub-frontend:latest

      - name: Build & Push Backend
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/teamhub-backend:latest

  dev-deploy-log:
    needs: [frontend-check, backend-check]
    if: |
      github.ref == 'refs/heads/develop' || 
      github.base_ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Log Deploy
        run: echo "Эта проверка видит, что мы метим в develop!"